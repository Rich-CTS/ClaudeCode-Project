name: Claude PR Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Review with Claude
        id: claude_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request

          with open("pr_diff.txt") as f:
              diff = f.read()[:10000]

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{
                  "role": "user",
                  "content": (
                      "Review this pull request diff and check for anything that could cause irreparable damage, including: "
                      "breaking changes to APIs or interfaces, destructive database migrations, removal of critical auth/security logic, "
                      "dependency changes that could break the app, security vulnerabilities, or unhandled edge cases that could cause data corruption. "
                      "Be concise. If nothing critical is found, say the PR looks safe to merge.\n\nDiff:\n" + diff
                  )
              }]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read())

          review = data["content"][0]["text"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("review<<EOF\n")
              f.write(review + "\n")
              f.write("EOF\n")
          EOF

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.claude_review.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Claude PR Review\n\n${review}`
            });
